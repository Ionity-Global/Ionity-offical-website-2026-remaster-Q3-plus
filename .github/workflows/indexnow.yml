name: IndexNow

# Auto-submit the site's URLs to IndexNow (Bing · Yandex · Seznam · Naver · Yep)
# on every content deploy, so changes get crawled in minutes instead of days.
# The key file (5dea41546142f5de1ed02f0e76d56288.txt) lives at the site root.
# No secrets needed — the IndexNow key is public by design.

on:
  push:
    branches: [master]
    paths:
      - '**/*.html'
      - 'sitemap.xml'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: indexnow
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Submit sitemap URLs to IndexNow
        run: |
          set -euo pipefail
          KEY=5dea41546142f5de1ed02f0e76d56288
          HOST=ionity.co.za
          # pull every <loc> out of the sitemap so the list stays in sync automatically
          urls=$(grep -oE '<loc>[^<]+</loc>' sitemap.xml | sed -E 's#</?loc>##g')
          if [ -z "$urls" ]; then echo "No URLs found in sitemap.xml"; exit 1; fi
          json=$(jq -nc \
            --arg host "$HOST" \
            --arg key "$KEY" \
            --arg kl "https://$HOST/$KEY.txt" \
            '{host:$host, key:$key, keyLocation:$kl, urlList:$ARGS.positional}' \
            --args $urls)
          echo "Payload: $json"
          code=$(curl -s -o /tmp/resp -w "%{http_code}" -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" --data "$json")
          echo "IndexNow responded HTTP $code"; cat /tmp/resp || true
          # 200 = accepted, 202 = received/queued; anything else is a failure
          case "$code" in 200|202) echo "✅ submitted $(echo "$urls" | wc -l) URLs";; *) exit 1;; esac
