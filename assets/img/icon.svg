<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Ionity">
  <defs>
    <linearGradient id="ig" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3366FF"/>
      <stop offset="1" stop-color="#00D2FF"/>
    </linearGradient>
    <radialGradient id="core" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#9FE7FF"/>
      <stop offset="0.5" stop-color="#00D2FF"/>
      <stop offset="1" stop-color="#3366FF"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="116" fill="#0A0A12"/>
  <g transform="translate(256 256)" fill="none" stroke="url(#ig)">
    <!-- ion orbitals -->
    <ellipse rx="150" ry="64" stroke-width="10" opacity="0.85" transform="rotate(28)"/>
    <ellipse rx="150" ry="64" stroke-width="10" opacity="0.85" transform="rotate(-28)"/>
    <ellipse rx="150" ry="64" stroke-width="6"  opacity="0.4"  transform="rotate(90)"/>
    <!-- orbiting nodes -->
    <circle cx="132" cy="70" r="13" fill="#00D2FF" stroke="none"/>
    <circle cx="-132" cy="-70" r="9" fill="#3366FF" stroke="none"/>
  </g>
  <!-- charged core / the 'I' -->
  <g filter="url(#glow)">
    <circle cx="256" cy="256" r="34" fill="url(#core)"/>
    <rect x="246" y="150" width="20" height="212" rx="10" fill="url(#core)" opacity="0.0"/>
  </g>
</svg>
